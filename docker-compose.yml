services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fileshare
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: fileshare
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fileshare"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: ./backend/.env
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    ports:
      - "5173:80"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
    - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  uploads: