name: Deploy to EC2 (auto)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ec2-auto
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build images
        run: docker compose build --pull

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: safe-drop-backend:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: safe-drop-frontend:latest
          format: table
          severity: CRITICAL
          exit-code: "1"

      - name: Scan nginx image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: safe-drop-nginx:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

  deploy:
    needs: scan
    runs-on: ubuntu-latest
    steps:
      - name: Deploy latest main to EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch --all
            git reset --hard origin/main
            docker compose up -d --build
            docker image prune -f